<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Access Denied</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-950 min-h-screen flex items-center justify-center">
    <div class="text-center">
        <div class="w-20 h-20 bg-red-900/50 border border-red-700 rounded-2xl flex items-center justify-center mx-auto mb-6">
            <span class="text-red-400 text-4xl">⛔</span>
        </div>
        <h1 class="text-white text-2xl font-bold">Access Denied</h1>
        <p class="text-gray-400 text-sm mt-2">
            Your role does not have permission to access this page.
        </p>
        <a href="/dashboard/"
           class="inline-block mt-6 bg-gray-800 hover:bg-gray-700 text-white px-6 py-2 rounded-lg text-sm">
            ← Return to Dashboard
        </a>
    </div>
</body>
</html>
